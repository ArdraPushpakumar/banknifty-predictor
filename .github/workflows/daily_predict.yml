name: Daily Bank Nifty Prediction

on:
  schedule:
    # 11:00 UTC = 4:30 PM IST, after NSE market close (3:30 PM IST), weekdays only.
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-training.txt

      - name: Run daily prediction
        run: python src/daily_predict.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Daily data + prediction update [skip ci]" || echo "No changes to commit"
          git push
